id = "azure_foundry"
name = "Azure AI Foundry"
doc = "https://ai.azure.com/explore/models"

env = ["AZURE_FOUNDRY_API_KEY"]

[[config_schema]]
name = "base_url"
type = "string"
required = true
doc = "Azure AI Foundry API base URL (e.g. https://{instance_name}.openai.azure.com)"

[[config_schema]]
name = "deployment_name"
type = "string"
required = false
doc = "Azure AI Foundry deployment name for the model to use"

[[config_schema]]
name = "api_version"
type = "string"
required = false
doc = "Azure AI Foundry API version to use (e.g. 2024-06-01)"
