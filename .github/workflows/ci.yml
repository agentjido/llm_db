name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: agentjido/github-actions/.github/workflows/elixir-lint.yml@main

  test:
    name: Test
    uses: agentjido/github-actions/.github/workflows/elixir-test.yml@main
    with:
      otp_versions: '["27", "28"]'
      elixir_versions: '["1.18", "1.19"]'
      test_command: mix test

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - run: mix deps.get
      - run: mix llm_db.build --check
      - name: Check history drift
        run: |
          set -euo pipefail

          if mix llm_db.history.check; then
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            latest_metadata_commit="$(git rev-list --max-count=1 HEAD -- priv/llm_db/providers priv/llm_db/manifest.json || true)"

            if [ -n "$latest_metadata_commit" ] && git rev-parse --verify "${latest_metadata_commit}^" >/dev/null 2>&1; then
              echo "Retrying history check against ${latest_metadata_commit}^ to tolerate squash-merged metadata commits."
              mix llm_db.history.check --to "${latest_metadata_commit}^"
              exit 0
            fi
          fi

          exit 1
